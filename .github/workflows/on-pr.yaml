name: on-pr

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/on-pr.yaml'
      - '.gitops/**'
      - 'apis/**'
      - 'examples/**'
      - 'tests/**'
      - 'functions/**'
      - 'upbound.yaml'

permissions:
  id-token: write
  packages: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/validate.yaml@v2.20.0
    with:
      examples: |
        [
          { "example": "examples/identitycenters/minimal.yaml" },
          { "example": "examples/identitycenters/minimal.yaml", "observed": "examples/test/mocks/observed-resources/minimal/steps/1/" },
          { "example": "examples/identitycenters/minimal.yaml", "observed": "examples/test/mocks/observed-resources/minimal/steps/2/" },
          { "example": "examples/identitycenters/groups.yaml" },
          { "example": "examples/identitycenters/groups.yaml", "observed": "examples/test/mocks/observed-resources/groups/steps/1/" },
          { "example": "examples/identitycenters/groups.yaml", "observed": "examples/test/mocks/observed-resources/groups/steps/2/" },
          { "example": "examples/identitycenters/test-no-users.yaml" }
        ]
      api_path: apis/identitycenters
      error_on_missing_schemas: true

  test:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/test.yaml@v2.20.0

  e2e:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/e2e.yaml@v2.20.0
    with:
      timeout-minutes: 40
      aws: true
      aws-use-oidc: true
      aws-account-id: "034489662075"
      aws-region: us-east-2
      env-vars: |
        {
          "SSO_INSTANCE_ARN": "${{ vars.SSO_INSTANCE_ARN }}",
          "IDENTITY_STORE_ID": "${{ vars.IDENTITY_STORE_ID }}",
          "TARGET_ACCOUNT_ID": "${{ vars.TARGET_ACCOUNT_ID }}",
          "ADMINS_GROUP_NAME": "${{ vars.ADMINS_GROUP_NAME }}",
          "ADMINS_GROUP_ID": "${{ vars.ADMINS_GROUP_ID }}",
          "PAT_USER_NAME": "${{ vars.PAT_USER_NAME }}",
          "PAT_USER_ID": "${{ vars.PAT_USER_ID }}",
          "PAT_MEMBERSHIP_ID": "${{ vars.PAT_MEMBERSHIP_ID }}",
          "ADMIN_ACCESS_PERMISSION_SET_NAME": "${{ vars.ADMIN_ACCESS_PERMISSION_SET_NAME }}",
          "ADMIN_ACCESS_PERMISSION_SET_ARN": "${{ vars.ADMIN_ACCESS_PERMISSION_SET_ARN }}"
        }

  publish:
    needs:
      - validate
      - test
    uses: unbounded-tech/workflows-crossplane/.github/workflows/publish.yaml@v2.20.0
    secrets: inherit
    with:
      tag: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
